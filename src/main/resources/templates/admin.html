<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../../public/css/admin.css" th:href="@{/css/admin.css}" rel="stylesheet"/>
    <title>Admin Table</title>
</head>
<body>


<header>
    <nav>
        <div class="pages">
            <a href="#" onclick="showSection('orders')">Orders</a>
            <a href="#" onclick="showSection('customers')">Customers</a>
        </div>
        <div class="mail-cart" >
            <strong id="nav-username"></strong>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>
</header>

<main>
    <div id="orders-section">
        <h1>All Orders</h1>
        <table id="orders-table">
            <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Date</th>
                <th>Total</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="orders-body"></tbody>
        </table>
    </div>

    <div id="customers-section" style="display:none;">
        <h1>All Customers</h1>
        <table id="customers-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Balance</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="customers-body"></tbody>
        </table>
    </div>
</main>

<div id="order-modal">
    <div id="modal-content">
        <div id="modal-header">
            <h2 id="modal-title"></h2>
            <button onclick="closeModal()">✕</button>
        </div>
        <div id="modal-body"></div>
    </div>
</div>

<div id="balance-modal" style="display:none;">
    <div id="balance-modal-content">
        <div id="balance-modal-header">
            <h2 id="balance-modal-title"></h2>
            <button onclick="closeBalanceModal()">✕</button>
        </div>
        <div id="balance-modal-body">
            <label for="balance-input">New balance (kr):</label>
            <input type="number" id="balance-input" min="0" step="0.01"/>
        </div>
        <div id="balance-modal-footer">
            <button onclick="saveBalance()">Save</button>
            <button onclick="closeBalanceModal()">Cancel</button>
        </div>
    </div>
</div>


<script src="/javascript/admin.js"></script>
</body>
</html>
