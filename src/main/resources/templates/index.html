<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../../public/css/startside.css" th:href="@{/css/startside.css}" rel="stylesheet"/>
    <title>Olsker Cupcakes</title>
</head>
<body>
<header>
    <nav>
        <div class="pages">
            <a href="#1">Orders</a>
            <a href="#2">Customers</a>
        </div>
        <div class="mail-cart">
            <div>
                <a href="#">mail@gmail.com</a>
            </div>
            <a href="#shop"><img src="../public/images/shopping-cart.svg" alt="" id="shopping-cart"></a>
        </div>
    </nav>
</header>

<main>
    <div class="main">
        <img src="/images/logo.svg" alt="" id="logo">
        <div class="cc-maker">
            <h1>Cupcake Maker</h1>
            <div class="choices">
                <form id="cupcake-form">
                    <label for="bottoms">Choose bottom:</label>
                    <select id="bottoms" name="bottoms"></select>

                    <label for="toppings">Choose topping:</label>
                    <select id="toppings" name="toppings"></select>

                    <label for="amount">Choose amount:</label>
                    <input type="number" id="amount" min="1" value="1">

                    <button type="button" onclick="placeOrder()">Add to cart</button>
                </form>
            </div>
        </div>
        <div class="container">
            <div class="image-cycle">
                <figure>
                    <img src="/images/vanilla-top.svg" alt="">
                    <img src="/images/pink-top.svg" alt="">
                    <img src="/images/choco-top.svg" alt="">
                    <img src="/images/smarties-top.svg" alt="">
                    <img src="/images/strawberry-top.svg" alt="">
                    <img src="/images/vanilla-top.svg" alt="">
                </figure>
            </div>
            <div class="allergies">
                <h2>Allergen information:</h2>
                <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Beatae itaque provident repudiandae. Amet architecto autem dignissimos dolores ducimus esse ex, fuga, id ipsam iste nihil possimus qui quibusdam similique, voluptatibus.</p>
            </div>
        </div>
    </div>
</main>

<script src="/javascript/main.js"></script>
</body>
</html>
